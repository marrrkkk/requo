name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: quoteflow
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d quoteflow"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/quoteflow
      DATABASE_DIRECT_URL: postgres://postgres:postgres@127.0.0.1:5432/quoteflow
      BETTER_AUTH_SECRET: 0123456789abcdef0123456789abcdef
      BETTER_AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_BETTER_AUTH_URL: http://127.0.0.1:3000/api/auth
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: demo-anon-key
      SUPABASE_SERVICE_ROLE_KEY: demo-service-role-key
      DEMO_OWNER_EMAIL: demo@quoteflow.test
      DEMO_OWNER_PASSWORD: ChangeMe123456!
      DEMO_WORKSPACE_SLUG: brightside-print-studio
      DEMO_QUOTE_PUBLIC_TOKEN: demoquote1002senttoken
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Run end-to-end tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
